<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOFSET — Referral Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0a0a;
      --white: #fafafa;
      --grey-1: #f0f0ee;
      --grey-2: #e0e0dd;
      --grey-3: #999990;
      --grey-4: #555550;
      --green: #3B6D11;
      --green-light: #EAF3DE;
      --green-border: #C0DD97;
      --gold: #c9a84c;
      --silver: #8a9bb0;
      --bronze: #a0724a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--grey-1);
      color: var(--black);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      background: var(--black);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-logo {
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      color: var(--white);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .header-label {
      font-size: 11px;
      color: var(--grey-3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--grey-3);
      letter-spacing: 0.08em;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4CAF50;
      position: relative;
      flex-shrink: 0;
    }

    .live-dot::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: #4CAF50;
      opacity: 0.3;
      animation: pulse 2s ease-out infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.3; }
      70% { transform: scale(2.5); opacity: 0; }
      100% { transform: scale(1); opacity: 0; }
    }

    .refresh-btn {
      background: none;
      border: 0.5px solid var(--grey-4);
      color: var(--grey-3);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 7px 14px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .refresh-btn:hover {
      border-color: var(--white);
      color: var(--white);
    }

    .main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 40px 80px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--white);
      border: 0.5px solid var(--grey-2);
      border-radius: 4px;
      padding: 24px 28px;
      animation: fadeUp 0.4s ease both;
    }

    .stat-card:nth-child(2) { animation-delay: 0.05s; }
    .stat-card:nth-child(3) { animation-delay: 0.1s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stat-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey-3);
      margin-bottom: 10px;
    }

    .stat-value {
      font-family: 'DM Mono', monospace;
      font-size: 40px;
      font-weight: 300;
      color: var(--black);
      line-height: 1;
      transition: all 0.3s;
    }

    .stat-sub {
      font-size: 11px;
      color: var(--grey-3);
      margin-top: 8px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .section-title {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--grey-4);
    }

    .section-count {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--grey-3);
    }

    .search-wrap { margin-bottom: 12px; }

    .search-input {
      width: 100%;
      background: var(--white);
      border: 0.5px solid var(--grey-2);
      border-radius: 4px;
      padding: 12px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--black);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input::placeholder { color: var(--grey-3); }
    .search-input:focus { border-color: var(--black); }

    .table-wrap {
      background: var(--white);
      border: 0.5px solid var(--grey-2);
      border-radius: 4px;
      overflow: hidden;
    }

    .table-head {
      display: grid;
      grid-template-columns: 52px 1fr 180px 90px 120px;
      padding: 10px 20px;
      border-bottom: 0.5px solid var(--grey-2);
      background: var(--grey-1);
    }

    .th {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey-3);
    }

    .th.right { text-align: right; }

    .table-row {
      display: grid;
      grid-template-columns: 52px 1fr 180px 90px 120px;
      padding: 13px 20px;
      border-bottom: 0.5px solid var(--grey-1);
      align-items: center;
      transition: background 0.15s;
      animation: rowIn 0.25s ease both;
    }

    @keyframes rowIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .table-row:last-child { border-bottom: none; }
    .table-row:hover { background: var(--grey-1); }

    .rank {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--grey-3);
    }

    .rank.gold { color: var(--gold); font-weight: 500; }
    .rank.silver { color: var(--silver); font-weight: 500; }
    .rank.bronze { color: var(--bronze); font-weight: 500; }

    .email-cell {
      font-size: 13px;
      color: var(--black);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding-right: 16px;
    }

    .slug-cell {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--grey-3);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding-right: 16px;
    }

    .count-cell {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--black);
      text-align: right;
    }

    .count-cell.zero { color: var(--grey-3); font-weight: 400; }

    .bar-cell {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-left: 16px;
    }

    .bar-track {
      width: 80px;
      height: 3px;
      background: var(--grey-2);
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      transition: width 0.8s ease;
    }

    .empty-state {
      padding: 60px 20px;
      text-align: center;
    }

    .empty-state p {
      font-size: 13px;
      color: var(--grey-3);
      font-family: 'DM Mono', monospace;
    }

    .loading-state {
      padding: 60px 20px;
      text-align: center;
    }

    .loading-dots {
      display: inline-flex;
      gap: 6px;
    }

    .loading-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--grey-3);
      animation: loadPulse 1.2s ease infinite;
    }

    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes loadPulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }

    .last-updated {
      text-align: center;
      margin-top: 24px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--grey-3);
      letter-spacing: 0.06em;
    }

    .error-state {
      padding: 40px 20px;
      text-align: center;
    }

    .error-state p {
      font-size: 13px;
      color: #c0392b;
      font-family: 'DM Mono', monospace;
    }

    @media (max-width: 680px) {
      .main { padding: 24px 16px 60px; }
      .header { padding: 16px 20px; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .stats-row .stat-card:last-child { grid-column: span 2; }
      .table-head { grid-template-columns: 36px 1fr 70px; }
      .table-row { grid-template-columns: 36px 1fr 70px; }
      .slug-cell, .bar-cell { display: none; }
      .stat-value { font-size: 32px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div>
      <div class="header-logo">Sofset</div>
      <div class="header-label">Referral Dashboard</div>
    </div>
    <div class="header-right">
      <div class="live-indicator">
        <div class="live-dot"></div>
        Live
      </div>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
  </header>

  <main class="main">

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Signups</div>
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-sub">on the waitlist</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active Referrers</div>
        <div class="stat-value" id="stat-referrers">—</div>
        <div class="stat-sub">people with 1+ referral</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Referred</div>
        <div class="stat-value" id="stat-referred">—</div>
        <div class="stat-sub">signups via referral</div>
      </div>
    </div>

    <div class="section-header">
      <div class="section-title">Leaderboard</div>
      <div class="section-count" id="showing-count"></div>
    </div>

    <div class="search-wrap">
      <input
        type="text"
        class="search-input"
        placeholder="Search by email or referral slug..."
        id="search-input"
        oninput="filterTable()"
      />
    </div>

    <div class="table-wrap">
      <div class="table-head">
        <div class="th">#</div>
        <div class="th">Email</div>
        <div class="th">Referral Slug</div>
        <div class="th right">Referrals</div>
        <div class="th right">Share</div>
      </div>
      <div id="table-body">
        <div class="loading-state">
          <div class="loading-dots">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="last-updated" id="last-updated"></div>

  </main>

  <script>
    const SUPABASE_URL = 'https://yhkzlgjhxkrnbscyotof.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_uptft94ERHancO4xCOntUw_P3s0FGRX';

    let allData = [];
    let maxReferrals = 1;

    async function loadData() {
      document.getElementById('table-body').innerHTML = `
        <div class="loading-state">
          <div class="loading-dots">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
          </div>
        </div>
      `;

      try {
        // Fetch all profiles sorted by referral_count desc
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/waitlist?select=email,referral_slug,referral_count,referred_by_slug&order=referral_count.desc&limit=5000`,
          {
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`
            }
          }
        );

        if (!res.ok) throw new Error('Failed to fetch');

        allData = await res.json();

        // Stats
        const total = allData.length;
        const referrers = allData.filter(r => (r.referral_count || 0) > 0).length;
        const totalReferred = allData.filter(r => r.referred_by_slug).length;
        maxReferrals = Math.max(1, ...allData.map(r => r.referral_count || 0));

        animateCount('stat-total', total);
        animateCount('stat-referrers', referrers);
        animateCount('stat-referred', totalReferred);

        document.getElementById('last-updated').textContent =
          `Last updated ${new Date().toLocaleTimeString()}`;

        filterTable();

      } catch (err) {
        document.getElementById('table-body').innerHTML = `
          <div class="error-state">
            <p>Failed to load data. Check your Supabase connection.</p>
          </div>
        `;
        console.error(err);
      }
    }

    function filterTable() {
      const query = document.getElementById('search-input').value.toLowerCase().trim();
      const filtered = query
        ? allData.filter(r =>
            (r.email || '').toLowerCase().includes(query) ||
            (r.referral_slug || '').toLowerCase().includes(query)
          )
        : allData;

      document.getElementById('showing-count').textContent =
        filtered.length === allData.length
          ? `${allData.length.toLocaleString()} people`
          : `${filtered.length} of ${allData.length.toLocaleString()}`;

      renderTable(filtered);
    }

    function renderTable(data) {
      if (data.length === 0) {
        document.getElementById('table-body').innerHTML = `
          <div class="empty-state"><p>No results found.</p></div>
        `;
        return;
      }

      const rows = data.map((row, i) => {
        const count = row.referral_count || 0;
        const barPct = maxReferrals > 0 ? (count / maxReferrals) * 100 : 0;
        const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
        const rankSymbol = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}`;

        return `
          <div class="table-row" style="animation-delay:${Math.min(i * 0.02, 0.3)}s">
            <div class="rank ${rankClass}">${rankSymbol}</div>
            <div class="email-cell" title="${row.email || ''}">${row.email || '—'}</div>
            <div class="slug-cell" title="${row.referral_slug || ''}">${row.referral_slug || '—'}</div>
            <div class="count-cell ${count === 0 ? 'zero' : ''}">${count}</div>
            <div class="bar-cell">
              <div class="bar-track">
                <div class="bar-fill" style="width:${barPct}%"></div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('table-body').innerHTML = rows;
    }

    function animateCount(id, target) {
      const el = document.getElementById(id);
      const start = 0;
      const duration = 800;
      const startTime = performance.now();

      function update(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const ease = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.floor(start + (target - start) * ease).toLocaleString();
        if (progress < 1) requestAnimationFrame(update);
        else el.textContent = target.toLocaleString();
      }

      requestAnimationFrame(update);
    }

    // Load on startup
    loadData();
  </script>

</body>
</html>
